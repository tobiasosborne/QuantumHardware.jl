# AWS Braket ingest config — vendor presets + per-device overrides.
# Loaded by src/ingest/braket.jl. Adding a new Braket ARN should require
# editing only this file, not the adapter code.

# --- Vendor presets ----------------------------------------------------------
# Keyed by the lowercase vendor segment in the ARN
# (`arn:aws:braket:…::device/qpu/<vendor>/<model>`).

[vendor.aqt]
org         = "Alpine Quantum Technologies (AQT)"
country     = "AUT"
modality    = "trapped_ion"
api_kind    = "braket"
cloud       = "aws_braket"
single_ns   = 20000.0
two_ns      = 200000.0
readout_ns  = 300000.0

[vendor.ionq]
org         = "IonQ"
country     = "USA"
modality    = "trapped_ion"
api_kind    = "braket"
cloud       = "aws_braket"
single_ns   = 10000.0
two_ns      = 300000.0
readout_ns  = 200000.0

[vendor.iqm]
org         = "IQM"
country     = "FIN"
modality    = "sc_transmon"
api_kind    = "braket"
cloud       = "aws_braket"
single_ns   = 40.0
two_ns      = 100.0
readout_ns  = 1500.0

[vendor.quera]
org         = "QuEra Computing"
country     = "USA"
modality    = "neutral_atom"
api_kind    = "braket"
cloud       = "aws_braket"
single_ns   = 50.0
two_ns      = 500.0
readout_ns  = 1000000.0

[vendor.rigetti]
org         = "Rigetti Computing"
country     = "USA"
modality    = "sc_transmon"
api_kind    = "braket"
cloud       = "aws_braket"
single_ns   = 60.0
two_ns      = 150.0
readout_ns  = 1200.0

# --- Per-device overrides ----------------------------------------------------
# Keyed by `<vendor>/<Model>` (matches the ARN tail). Pulled from
# Session-1 research census and vendor public pages; documented in the
# emitted TOML's header comment so future agents can trace each value.

[device."aqt/Ibex-Q1"]
slug          = "aqt-ibex-q1"
family        = "Ibex"
display       = "AQT Ibex-Q1"
num_qubits    = 24
topology_kind = "all_to_all"
