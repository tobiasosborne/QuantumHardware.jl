[[native_gates]]
name = "MS_microwave"
arity = 2
kind = "gate"
params = ["theta"]

[[native_gates]]
name = "readout"
arity = 1
kind = "measurement"

[[native_gates]]
name = "reset"
arity = 1
kind = "reset"

