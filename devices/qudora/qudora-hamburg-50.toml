# QUDORA Hamburg-50 — 50-qubit microwave-driven trapped-ion system (DLR contract)
#
# Projected:     Delivery January 2027 under €42M DLR contract, built with
#                NXP Semiconductors Germany GmbH.
# Modality:      Trapped-ion Yb+ / Ba+ with Near-Field Quantum Control (NFQC)
#                — microwave electronics replacing laser gate drive.
# Status:        PROJECTED at time of ingest.

