[organization]
name = "QUDORA Technologies"
kind = "commercial"
country = "DEU"
parent = "Deep-tech spin-off of PTB + TU Braunschweig + Leibniz U Hannover; QVLS ecosystem member; DLR QCI programme contractor"
homepage_url = "https://qudora.com/"

[family]
name = "QUDORA NFQC"
modality = "trapped_ion"

[device]
name = "QUDORA Hamburg-50 (XAPHIRO)"
status = "under_construction"
announced_date = 2024-01-01
num_qubits = 50
architecture_notes = """
XAPHIRO — the DLR QCI project name for QUDORA × NXP's Hamburg system. A 50-
qubit quantum processor built around "several interconnected registers that
can be used for preparation, storage, manipulation, or detection of the
qubits" (per DLR QCI kickoff page). Qubits are transported between registers
by electric fields; elementary quantum gates are implemented by chip-
integrated microwave circuit elements (QUDORA's Near-Field Quantum Control
= NFQC — no laser systems in the gate path). Qubit-state readout uses a
photon detector based on CMOS technology developed by NXP Semiconductors.

€42M DLR (German Aerospace Center / Quantum Computing Initiative) contract.
Four-year build at the DLR innovation centre in Hamburg; delivery target
January 2027. Physical qudora + NXP team presence at the Hamburg facility
since the project kickoff (XAPHIRO press event).

QUDORA is a 2021 deep-tech spin-off of the Physikalisch-Technische Bundes-
anstalt (PTB), Technische Universität Braunschweig, and Leibniz Universität
Hannover; part of the Quantum Valley Lower Saxony (QVLS) ecosystem.
"""

[topology]
kind = "all_to_all"
reconfigurable = true
# Effective all-to-all via ion-chain reordering or QCCD shuttling; details
# to be confirmed at delivery.

