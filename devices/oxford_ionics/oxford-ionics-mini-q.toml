# Oxford Ionics Mini-Q (Cyberagentur) — hand-curated
#
# Portable/mobile trapped-ion quantum computer being built by Oxford Ionics
# + Infineon Technologies for Cyberagentur (German Federal agency for
# innovation in cybersecurity). Announced 2024-09-18 under a €35M contract.
# Not yet delivered at the time of this record.
#
# Multi-vendor build: Oxford Ionics is primary builder (QPU + system);
# Infineon contributes ion-trap chip microfabrication. Customer is a
# sovereign government cybersecurity agency — not a public cloud product.
#
# As with QUARTET, exact qubit count not disclosed; placed at lower bound of
# Oxford Ionics' 2025 Foundation-class roadmap tier (16-64 qubit).
#
# Organisational note: Oxford Ionics Ltd. became a subsidiary of IonQ on
# 2025-09-17, one year after the Mini-Q announcement.

[meta]
id             = "oxford-ionics-mini-q"
org_slug       = "oxford_ionics"
aliases        = [
    "Mini-Q",
    "Oxford Ionics Mini-Q (Cyberagentur)",
    "OI-Infineon portable QC",
]
schema_version = "0.1"
created_at     = 2026-04-15T00:00:00Z
updated_at     = 2026-04-15T00:00:00Z

[organization]
name         = "Oxford Ionics Ltd."
kind         = "commercial"
country      = "GBR"
parent       = "IonQ, Inc. (acquired 2025-09-17)"
homepage_url = "https://www.oxionics.com"

[family]
name                = "Mini-Q"
modality            = "trapped_ion"

[device]
name                 = "Oxford Ionics Mini-Q (Cyberagentur)"
status               = "announced"
announced_date       = 2024-09-18
num_qubits           = 16
architecture_notes = """
First 'mobile' variant of Oxford Ionics' chip-trap quantum computer line.
Electronic Qubit Control platform (on-chip integrated electrodes; microwave +
static B-field gradient gates) scaled to a compact, ruggedised, energy-
efficient form factor suitable for transport and field deployment. Targets
national-security / mobile-defence applications for the German Federal
agency Cyberagentur.

Multi-vendor delivery: Oxford Ionics (QPU + full-stack system); Infineon
Technologies AG (R&D partner; scalable ion-trap chip microfabrication). Part
of a €35M Cyberagentur investment that also backed two other independent
contractors (names not in the announcement).

Exact qubit count not disclosed. Placed at the lower bound of the 2025
Foundation-class roadmap (16-64 qubit, 99.99% fidelity) that Mini-Q's
portable form factor is derived from. Delivery date not specified in the
announcement; status kept as `announced` pending a delivery press release.

Oxford Ionics Ltd. operates as a subsidiary of IonQ, Inc. from 2025-09-17.
"""

[topology]
kind           = "all_to_all"
reconfigurable = true

[[native_gates]]
name          = "1q_all_electronic"
arity         = 1
kind          = "gate"
duration_ns   = 50000.0
fidelity_mean = 0.9999916                # Löschnauer 2024 platform record

[[native_gates]]
name          = "2q_mølmer_sørensen"
arity         = 2
kind          = "gate"
duration_ns   = 300000.0
fidelity_mean = 0.9999                    # vendor platform claim

[[native_gates]]
name        = "readout"
arity       = 1
kind        = "measurement"
duration_ns = 500000.0

[[native_gates]]
name  = "reset"
arity = 1
kind  = "reset"

[noise_model]
# No device-specific calibration disclosed.

[timing]
single_qubit_gate_ns = 50000.0
two_qubit_gate_ns    = 300000.0
readout_ns           = 500000.0

[access]
cloud_provider = "none"
api_kind       = "custom"
tier           = "private"
auth_required  = true
pricing_notes  = "Bespoke government delivery; no public cloud access. €35M Cyberagentur contract."
sdk_packages   = []

