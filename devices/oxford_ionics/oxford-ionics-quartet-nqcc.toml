# Oxford Ionics QUARTET @ UK NQCC Harwell — hand-curated
#
# QUantum Advantage-Ready Trapped-ion Exploration Testbed. A commercial
# full-stack trapped-ion QPU built on Oxford Ionics' all-electronic chip-trap
# architecture (Electronic Qubit Control). Delivered to the UK National
# Quantum Computing Centre on 2025-08-13.
#
# Organisational note: Oxford Ionics Ltd. was acquired by IonQ, Inc. on
# 2025-09-17 (~1 month after QUARTET's delivery to NQCC). Kept under
# `devices/oxford_ionics/` with parent="IonQ, Inc." rather than migrated to
# `devices/ionq/` — the lineage, architecture, and Oxford-based team identity
# are all still Oxford Ionics.
#
# Spec-disclosure note: QUARTET's exact qubit count is NOT in the public
# announcement. Oxford Ionics' public 2025 "Foundation"-class roadmap tier is
# 16-64 qubits at 99.99% fidelity. We record 16 as a conservative lower bound
# and cite the products-page roadmap. A research follow-up issue tracks the
# open number.

[meta]
id             = "oxford-ionics-quartet-nqcc"
org_slug       = "oxford_ionics"
aliases        = [
    "QUARTET",
    "QUantum Advantage-Ready Trapped-ion Exploration Testbed",
    "NQCC Oxford Ionics system",
]
schema_version = "0.1"
created_at     = 2026-04-15T00:00:00Z
updated_at     = 2026-04-15T00:00:00Z

[organization]
name         = "Oxford Ionics Ltd."
kind         = "commercial"
country      = "GBR"
parent       = "IonQ, Inc. (acquired 2025-09-17)"
homepage_url = "https://www.oxionics.com"

[family]
name     = "QUARTET"
modality = "trapped_ion"

[device]
name                   = "Oxford Ionics QUARTET (NQCC)"
status                 = "in_service"
announced_date         = 2025-08-13
first_operational_date = 2025-08-13
num_qubits             = 16
architecture_notes = """
Full-stack trapped-ion quantum computer using Oxford Ionics' Electronic Qubit
Control: integrated-electrode chip trap where AC currents in on-chip traces
drive coherent gates (magnetic-field-gradient microwave scheme) and DC fields
from local electrodes provide site-selective tuning. Chip is manufactured in
standard semiconductor foundries. Field-upgradeable — the (credit-card-sized)
QPU module is swap-replaceable without changing chassis/infrastructure.

QUARTET is operated as a testbed at the NQCC Harwell data centre. Part of the
UK's Quantum Missions programme; the Q-Surge project (Oxford Ionics +
Riverlane + Bay Photonics) is slated to upgrade QUARTET with 2D qubit
connectivity — when delivered, that will warrant a separate DeviceRevision
file (lineage_predecessor = this).

Exact delivered qubit count not disclosed in the 2025-08-13 announcement;
placed here at the lower bound of the vendor's 2025 Foundation roadmap tier
(16-64 qubit, 99.99% fidelity). Ion species likely Ca-43 / Sr-88 based on
group heritage (Ballance, Oxford) but not disclosed.

Oxford Ionics Ltd. operates as a subsidiary of IonQ, Inc. from 2025-09-17.
Pre-acquisition: independent Oxford University spinout (founders Chris
Ballance, Tom Harty).
"""

[topology]
kind           = "all_to_all"
reconfigurable = true
# Chip-trap architecture can bring any two qubits into gate range via
# ion shuttling between zones; topology is physically all-to-all plus
# reconfigurable per-shot (zones assignable by program).

[[native_gates]]
name          = "1q_all_electronic"
arity         = 1
kind          = "gate"
duration_ns   = 50000.0                # microwave-driven π pulse, industry-typical
fidelity_mean = 0.9999916              # Löschnauer et al. 2024 lab demo on 7-zone chip

[[native_gates]]
name          = "2q_mølmer_sørensen"
arity         = 2
kind          = "gate"
duration_ns   = 300000.0
fidelity_mean = 0.9999                 # vendor products-page claim

[[native_gates]]
name        = "readout"
arity       = 1
kind        = "measurement"
duration_ns = 500000.0                 # electron-shelving ion readout, industry-typical

[[native_gates]]
name        = "reset"
arity       = 1
kind        = "reset"

[noise_model]
# Per-qubit T1/T2 not publicly disclosed for QUARTET. Mid-circuit measurement
# is supported (vendor products page).

[timing]
single_qubit_gate_ns = 50000.0
two_qubit_gate_ns    = 300000.0
readout_ns           = 500000.0

[access]
cloud_provider = "nqcc"
api_kind       = "custom"
tier           = "research_only"
auth_required  = true
pricing_notes  = "NQCC testbed programme access; not a public cloud offering. UK Quantum Missions / Innovate UK funded."
sdk_packages   = []

[roadmap]
# Vendor's 2025 Foundation tier target
originally_targeted_year    = 2025
originally_targeted_qubits  = 64        # upper end of 16-64 tier
originally_targeted_fidelity_1q = 0.9999
originally_targeted_fidelity_2q = 0.9999
narrative = "2025 Foundation-class: 16-64 physical qubits at 99.99% fidelity; 2026 Enterprise-grade 256+ qubit devices; 2027 10,000+ qubit systems (per oxionics.com/products roadmap)."

