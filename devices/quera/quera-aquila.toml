# QuEra Aquila — hand-curated
#
# Primary source: Wurtz et al., "Aquila: QuEra's 256-qubit neutral-atom quantum
# computer," arXiv:2306.11727 (June 2023). Archived as
#   sources/2026/04/15/arxiv-2306.11727-aquila-whitepaper.pdf
#   sha256 d930a5b4763a4e5e8e3a8e5c90d04cd00aa14183f64c3a5f9432ba42b9e19378
# AWS Braket docs (for canonical ARN) archived alongside.
#
# Note: restored hand-curated data lost when the first Braket pathway-A ingest
# overwrote the Session-1 stub (WORKLOG entry). This file intentionally does
# NOT carry the `# Auto-generated by scripts/` marker, so is_hand_curated()
# will protect it from future ingest overwrites.

[meta]
id = "quera-aquila"
org_slug = "quera"
aliases = [
    "Aquila",
    "QuEra Aquila",
    "arn:aws:braket:us-east-1::device/qpu/quera/Aquila",
]
schema_version = "0.1"
created_at = 2026-04-14T00:00:00Z
updated_at = 2026-04-15T00:00:00Z

[organization]
name         = "QuEra Computing Inc."
kind         = "commercial"
country      = "USA"
parent       = "QuEra Computing Inc. (spinout from Harvard/MIT; Lukin + Vuletić groups)"
homepage_url = "https://www.quera.com"

[family]
name     = "Aquila"
modality = "neutral_atom"

[device]
name                   = "QuEra Aquila"
status                 = "in_service"
announced_date         = 2022-11-28
first_operational_date = 2022-11-28
num_qubits             = 256
architecture_notes = """
Field-programmable qubit array (FPQA): individually-addressed Rubidium-87 atoms
held in optical tweezers inside a UHV cell, laser-cooled to microkelvin
temperatures. Atom positions are user-programmable per shot — maximum 256
filled sites within a 75×76 μm² bounding box with ≥4 μm inter-site spacing.
Operated as an analog Hamiltonian simulator: qubits are encoded in the ground
state |g⟩ and Rydberg state |r⟩ (n=70 of Rb-87); the programmable Hamiltonian
drives Ω(t), Δ(t), φ(t) and intrinsic Rydberg-blockade interactions. No
native gate-model circuit model; all computation is time-dependent Hamiltonian
evolution up to 4 μs per task. See Wurtz et al. 2306.11727 §1 for the
architecture, §1.5 for the capabilities datasheet.
"""

# --- Topology ---------------------------------------------------------------

[topology]
kind           = "analog_hamiltonian"
reconfigurable = true

[topology.position_constraints]
# Per Wurtz et al. §1.5 Datasheet (p.16). User programs atom positions each shot.
max_atoms                   = 256
max_filled_atoms            = 256
max_width_um                = 75.0
max_height_um               = 76.0
min_intersite_distance_um   = 4.0
min_vertical_row_spacing_um = 4.0

# --- Native "gates" ---------------------------------------------------------
# Aquila is analog-only; the "gate" below is the Rydberg-Hamiltonian evolution
# with three programmable time-dependent controls.

[[native_gates]]
name        = "rydberg_ahs"
arity       = 2                                # Rydberg-Rydberg is intrinsically pairwise
kind        = "analog_hamiltonian"
params      = ["Omega_t", "Delta_t", "phi_t"]
duration_ns = 4000.0                           # max user-defined evolution = 4 μs (§1.5)

[[native_gates]]
name        = "readout"
arity       = 1
kind        = "measurement"
duration_ns = 1000000.0                        # fluorescence imaging ≈ 1 ms (neutral-atom convention; not in datasheet)

[[native_gates]]
name  = "reset"
arity = 1
kind  = "reset"

# --- Noise model -----------------------------------------------------------

[noise_model.t2_us]
# §1.5 "Ground-Rydberg qubit coherence": T2* (Ramsey, non-interacting) = 5.8 μs,
# T2_echo = 11.4 μs. We record the Ramsey value as the primary summary; echo
# sits in a per-gate calibration snapshot when one lands.
kind = "ramsey"
mean = 5.8

[noise_model.readout]
# §1.5 detection errors: ε_det-fn = 0.01 (miss-filled-as-empty) → ground-state
# detection fidelity ≈ 0.99. Rydberg detection is asymmetric (ε_det-ryd = 0.08,
# so ≈ 0.92 Rydberg detection). We record the ground-state fidelity as the
# summary; see architecture_notes + provenance.
fidelity_mean = 0.99

# --- Timing (indicative for an analog device) ------------------------------
# These fields exist for gate-model uniformity; for Aquila they are:
#   single_qubit_gate_ns ≈ π/Ω_max = π/(15.8 rad/μs) ≈ 200 ns
#   two_qubit_gate_ns    ≈ blockaded Rabi cycle ≈ 500 ns
#   readout_ns           ≈ 1 ms fluorescence imaging

[timing]
single_qubit_gate_ns = 200.0
two_qubit_gate_ns    = 500.0
readout_ns           = 1000000.0

# --- Access ----------------------------------------------------------------

[access]
cloud_provider = "aws_braket"
api_kind       = "braket"
api_endpoint   = "https://braket.us-east-1.amazonaws.com/"
tier           = "paid"
auth_required  = true
pricing_notes  = "Per-shot pricing via AWS Braket task API; AHS tasks billed per program + per shot."
sdk_packages   = ["amazon-braket-sdk", "bloqade"]

# --- Benchmarks (from the whitepaper) --------------------------------------

[benchmarks.correlation_length]
z2_1d_sites          = 3.6
checkerboard_2d_sites = 5.7
methodology_url      = "https://arxiv.org/abs/2306.11727"
notes                = "Adiabatically prepared Z2 (1D) and checkerboard (2D) phase correlation lengths, per §1.5 datasheet + Example 3."

