# AQT IBEX Q1 — hand-curated
#
# Was initially seeded by scripts/ingest_braket.jl (pathway A, docs-scrape).
# Re-curated here from the authoritative AQT product page, which supersedes
# the Braket-ingested baseline. The Braket-preset `num_qubits = 24` that the
# prior auto-generated file carried was wrong — the vendor product page
# documents a 12-qubit fully-connected register. See `conflict = true`
# provenance entry below.
#
# Access paths: primary = AQT's own ARNICA cloud; secondary = AWS Braket
# (eu-north-1 ARN). Our schema's `access.cloud_provider` is a single value,
# so Braket is recorded there (the existing ARN stays queryable) and ARNICA
# is noted in aliases + architecture_notes. Tracked as schema brittleness.

[meta]
id             = "aqt-ibex-q1"
org_slug       = "aqt"
aliases        = [
    "AQT Ibex-Q1",
    "IBEX Q1",
    "IBEX",
    "arn:aws:braket:eu-north-1::device/qpu/aqt/Ibex-Q1",
    "ARNICA cloud endpoint",
]
schema_version = "0.1"
created_at     = 2026-04-14T00:00:00Z
updated_at     = 2026-04-15T00:00:00Z

[organization]
name         = "Alpine Quantum Technologies (AQT)"
kind         = "commercial"
country      = "AUT"
parent       = "Univ. Innsbruck / IQOQI spinout (Blatt group heritage)"
homepage_url = "https://www.aqt.eu"

[family]
name     = "Ibex"
modality = "trapped_ion"

[device]
name                   = "AQT IBEX Q1"
status                 = "in_service"
announced_date         = 2024-01-01
first_operational_date = 2024-01-01
num_qubits             = 12
architecture_notes = """
Fully-connected 12-qubit trapped-ion register using a linear Ca ion chain in
a Paul-trap architecture (PINE TRAP heritage, from Univ. Innsbruck / IQOQI
designs). Rack-integrated commercial system running in room temperature
(22 °C), <2 kW single-plug power draw. Accepts quantum circuits up to 2000
gates (vendor claim) with a duty cycle of >20,000 circuits/hour.

Native basis set: RZ, R (single-qubit θ-φ rotation), RXX (two-qubit MS-like
Ising coupling). Auto-calibration runs on a regular cadence to stabilise
gate parameters — remaining error rates "well known and stable", enabling
Markovian error models per the vendor.

Accessed primarily via AQT's own ARNICA cloud; additionally exposed as an
AWS Braket QPU ARN (eu-north-1). Used by customers for chemistry, portfolio
optimisation, risk, quantum security, and decryption benchmarks.

Important drift: the prior auto-generated (Braket ingest) version recorded
num_qubits = 24, pulled from a configured vendor preset. The AQT product
page (vendor-authoritative) explicitly documents a 12-qubit register — the
24 figure appears to have been a stale census value. Both values are
retained in provenance with `conflict = true` on the Braket-docs entry.
"""

[topology]
kind           = "all_to_all"
reconfigurable = false

[[native_gates]]
name          = "R"
arity         = 1
kind          = "gate"
params        = ["theta", "phi"]
duration_ns   = 50000.0
fidelity_mean = 0.99966

[[native_gates]]
name        = "RZ"
arity       = 1
kind        = "gate"
params      = ["phi"]
duration_ns = 0.0

[[native_gates]]
name          = "RXX"
arity         = 2
kind          = "gate"
params        = ["theta"]
duration_ns   = 300000.0
fidelity_mean = 0.987

[[native_gates]]
name        = "readout"
arity       = 1
kind        = "measurement"
duration_ns = 200000.0

[[native_gates]]
name  = "reset"
arity = 1
kind  = "reset"

[noise_model]

[noise_model.crosstalk]
nn_crosstalk_mean = 0.01
nn_crosstalk_max  = 0.018

[timing]
single_qubit_gate_ns = 50000.0
two_qubit_gate_ns    = 300000.0
readout_ns           = 200000.0

[access]
cloud_provider = "aws_braket"
api_kind       = "braket"
api_endpoint   = "https://braket.eu-north-1.amazonaws.com/"
tier           = "paid"
auth_required  = true
pricing_notes  = "Primary access via AQT ARNICA cloud; also AWS Braket per-shot (eu-north-1)."
sdk_packages   = ["amazon-braket-sdk", "qiskit-aqt-provider", "pytket-aqt"]

[benchmarks.quantum_volume]
value            = 128
register_size    = 12
methodology_url  = "https://www.aqt.eu/products/ibex-q1/"
notes            = "QV = 2^7; 12-qubit fully-connected register."

